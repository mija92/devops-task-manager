version: '3.8'
services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_USER=stefan
      - DB_PASSWORD=devops_pass
      - DB_HOST=db
      - DB_NAME=taskdb
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=stefan
      - POSTGRES_PASSWORD=devops_pass
      - POSTGRES_DB=taskdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
